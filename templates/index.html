<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Data Annotation</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet-Geoman (replaces Leaflet.Draw, better maintained) -->
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.16.0/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.16.0/dist/leaflet-geoman.min.js"></script>

    <!-- App CSS -->
    <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <div id="sidebar-header">
                <h2>Training Areas</h2>
                <div id="sort-controls">
                    <label>Sort by:</label>
                    <button id="sort-name" class="sort-btn active">Name</button>
                    <button id="sort-oid" class="sort-btn">OID</button>
                </div>
                <div id="nav-controls">
                    <button id="btn-prev" title="Previous (Left Arrow)">&laquo; Prev</button>
                    <button id="btn-next" title="Next (Right Arrow)">Next &raquo;</button>
                    <button id="btn-share" title="Copy link to current area">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="area-list"></div>
            <div id="dataset-config-panel"></div>
            <div id="sidebar-footer">
                <div id="complete-control">
                    <label><input type="checkbox" id="chk-complete" /> Mark Complete</label>
                </div>
                <div id="export-controls">
                    <button id="btn-export">Export Current</button>
                    <button id="btn-export-complete">Export Complete</button>
                    <button id="btn-export-all">Export All</button>
                </div>
            </div>
        </div>
        <div id="map-container">
            <div id="map"></div>
            <div id="toolbar">
                <div id="class-selector"></div>
                <div id="tool-buttons">
                    <button id="btn-draw" class="tool-btn" title="Draw polygon (D)">Draw</button>
                    <button id="btn-freehand" class="tool-btn" title="Freehand polygon (F)">Freehand</button>
                    <button id="btn-sam" class="tool-btn" title="SAM2 click-to-segment (S)">SAM2</button>
                    <button id="btn-select" class="tool-btn" title="Select polygons (Q)">Select</button>
                    <button id="btn-edit" class="tool-btn" title="Edit vertices (E)">Edit</button>
                    <button id="btn-delete" class="tool-btn" title="Delete polygon (X)">Delete</button>
                    <button id="btn-undo" class="tool-btn" title="Undo (Ctrl+Z)" style="opacity:0.5">Undo</button>
                    <button id="btn-dissolve" class="tool-btn" title="Dissolve overlapping polygons of same class">Dissolve</button>
                    <button id="btn-fill-toggle" class="tool-btn" title="Toggle polygon fill (T)">Fill</button>
                    <button id="btn-model-predict" class="tool-btn" title="Run model prediction on current area (M)">Predict</button>
                </div>
            </div>
        </div>
    </div>
    <div id="toast-container"></div>

    <!-- App JS modules -->
    <script src="/static/js/dataset_config.js"></script>
    <script src="/static/js/classes.js"></script>
    <script src="/static/js/map.js"></script>
    <script src="/static/js/annotations.js"></script>
    <script src="/static/js/drawing.js"></script>
    <script src="/static/js/sam.js"></script>
    <script src="/static/js/select.js"></script>
    <script src="/static/js/notes.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/model_predict.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
